<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание персонажа | Три шага до края</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fef7e8;
            font-family: 'Georgia', 'Times New Roman', serif;
            color: #1e1a15;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e9d6b0;
        }

        .header h1 {
            font-size: 2rem;
            color: #2f2a22;
        }

        .nav-links a {
            margin-left: 1.5rem;
            text-decoration: none;
            color: #b48c48;
            font-weight: bold;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: #2f2a22;
        }

        .character-sheet {
            background: rgba(255, 252, 240, 0.92);
            border-radius: 48px;
            padding: 2rem;
            border: 1px solid #e9d6b0;
        }

        .top-row {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .image-block {
            flex: 0 0 280px;
        }

        .portrait-frame {
            background: #f3ecd9;
            border: 3px double #b48c48;
            border-radius: 24px;
            padding: 0.8rem;
        }

        .portrait-placeholder {
            background: #e6dbbc;
            width: 100%;
            aspect-ratio: 3 / 4;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7a5a3a;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .img-upload-btn {
            margin-top: 12px;
            background: #e9d5a7;
            border: none;
            padding: 8px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            font-family: inherit;
        }

        .status-block {
            flex: 1;
            background: #fffcf3;
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid #ecdca8;
        }

        .status-header input {
            font-size: 1.8rem;
            font-weight: bold;
            border: none;
            background: transparent;
            width: 100%;
            font-family: inherit;
            margin-bottom: 1rem;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .status-label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #b48c48;
            text-transform: uppercase;
        }

        .status-item input, .status-item textarea {
            width: 100%;
            margin-top: 0.3rem;
            padding: 0.5rem;
            border: 1px solid #dac292;
            border-radius: 12px;
            font-family: inherit;
        }

        .inventory-box textarea {
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.5rem;
            border: 1px solid #dac292;
            border-radius: 12px;
            font-family: inherit;
            resize: vertical;
        }

        .under-image-info {
            margin-top: 1.5rem;
            background: #fffcf3;
            border-radius: 28px;
            padding: 1.2rem;
            border: 1px solid #ecdca8;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }

        .info-field label {
            font-size: 0.75rem;
            font-weight: bold;
            color: #b48c48;
            text-transform: uppercase;
        }

        .info-field input {
            width: 100%;
            margin-top: 0.3rem;
            padding: 0.5rem;
            border: 1px solid #dac292;
            border-radius: 12px;
            font-family: inherit;
        }

        .tabs-container {
            margin-top: 2rem;
        }

        .tabs-header {
            display: flex;
            gap: 0.5rem;
            border-bottom: 2px solid #ecdca8;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            color: #7a684a;
        }

        .tab-btn.active {
            color: #2f2a22;
            border-bottom: 3px solid #c9a458;
        }

        .tab-content {
            display: none;
            background: #fffcf3;
            border-radius: 24px;
            padding: 1.5rem;
            margin-top: 1rem;
            border: 1px solid #ecdca8;
        }

        .tab-content.active {
            display: block;
        }

        .tab-content textarea {
            width: 100%;
            min-height: 300px;
            padding: 1rem;
            border: 1px solid #dac292;
            border-radius: 20px;
            font-family: inherit;
            resize: vertical;
        }

        .submit-btn {
            background: #c7a252;
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 48px;
            cursor: pointer;
            width: 100%;
            margin-top: 2rem;
            font-family: inherit;
        }

        .response-area {
            margin-top: 1.5rem;
            background: #e9e0ca;
            border-radius: 28px;
            padding: 1.2rem;
            border-left: 8px solid #b48c48;
            white-space: pre-line;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            max-width: 500px;
            text-align: center;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .modal-buttons button {
            padding: 0.5rem 1.5rem;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-family: inherit;
        }

        @media (max-width: 900px) {
            .info-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .status-grid {
                grid-template-columns: 1fr;
            }
            .top-row {
                flex-direction: column;
            }
            .image-block {
                flex: 0 0 auto;
                width: 100%;
                max-width: 300px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📜 Создание персонажа</h1>
        <div class="nav-links">
            <a href="/">📝 Создать</a>
            <a href="/list">📋 Список анкет</a>
        </div>
    </div>

    <div class="character-sheet">
        <div class="top-row">
            <div class="image-block">
                <div class="portrait-frame">
                    <div class="portrait-placeholder" id="portraitPreview" onclick="document.getElementById('imageUpload').click()">
                        <span>⚔️ ПОРТРЕТ ⚔️</span>
                    </div>
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                    <button type="button" class="img-upload-btn" id="uploadBtn">📜 Загрузить изображение</button>
                    <input type="text" id="imageUrl" placeholder="Или вставьте ссылку на изображение" style="margin-top: 8px; width: 100%;">
                </div>
            </div>

            <div class="status-block">
                <div class="status-header">
                    <input type="text" id="charName" placeholder="Имя персонажа">
                </div>
                <div class="status-grid">
                    <div class="status-item">
                        <div class="status-label">⚡ Состояние</div>
                        <input type="text" id="status" placeholder="Жив, здоров...">
                    </div>
                    <div class="status-item">
                        <div class="status-label">⏰ Время на данный момент</div>
                        <input type="text" id="currentTime" placeholder="1547 год, 3 день Красноплода...">
                    </div>
                    <div class="status-item">
                        <div class="status-label">📍 Локация</div>
                        <input type="text" id="location" placeholder="Империя, Троувер, главный квартал...">
                    </div>
                </div>
                <div class="inventory-box">
                    <div class="status-label">🎒 Инвентарь</div>
                    <textarea id="inventory" rows="3" placeholder="Запасы еды на три дня, веревка, факелы..."></textarea>
                </div>
            </div>
        </div>

        <div class="under-image-info">
            <div class="info-grid">
                <div class="info-field"><label>🧝 Раса</label><input type="text" id="race" placeholder="Чистокровный человек"></div>
                <div class="info-field"><label>📅 Дата рождения</label><input type="text" id="birthDate" placeholder="1476 год от Второго Катаклизма, 3 день Студовея"></div>
                <div class="info-field"><label>🏔️ Место рождения</label><input type="text" id="birthPlace" placeholder="Империя, Троувер, главный квартал"></div>
                <div class="info-field"><label>⏳ Годы жизни</label><input type="text" id="lifespan" placeholder="1476 г. - н. в."></div>
                <div class="info-field"><label>⭐ Знак Звездного круга</label><input type="text" id="starSign" placeholder="Мышь"></div>
                <div class="info-field"><label>📖 Первое появление</label><input type="text" id="firstAppearance" placeholder="Клубок 2"></div>
                <div class="info-field"><label>👑 Статус</label><input type="text" id="statusTitle" placeholder="Эшевен лекарской науки"></div>
                <div class="info-field"><label>⚔️ Профессия</label><input type="text" id="profession" placeholder="Лекарь"></div>
            </div>
        </div>

        <div class="tabs-container">
            <div class="tabs-header">
                <button class="tab-btn active" data-tab="bio">📜 Биография</button>
                <button class="tab-btn" data-tab="appearance">🎭 Внешность</button>
                <button class="tab-btn" data-tab="personality">💭 Характер</button>
            </div>
            <div class="tab-content active" id="bio">
                <textarea id="biography" placeholder="История жизни персонажа..."></textarea>
            </div>
            <div class="tab-content" id="appearance">
                <textarea id="appearanceText" placeholder="Описание внешности..."></textarea>
            </div>
            <div class="tab-content" id="personality">
                <textarea id="personalityText" placeholder="Характер и мировоззрение..."></textarea>
            </div>
        </div>

        <button class="submit-btn" id="submitForm">🔮 Сохранить анкету 🔮</button>
        <div id="responseMessage" class="response-area">✨ Заполните анкету и нажмите сохранить ✨</div>
    </div>
</div>

<div id="confirmModal" class="modal">
    <div class="modal-content">
        <h3>⚠️ Персонаж с таким именем уже существует</h3>
        <p id="modalMessage"></p>
        <div class="modal-buttons">
            <button id="confirmOverwrite">🔄 Перезаписать</button>
            <button id="confirmCancel">❌ Отмена</button>
        </div>
    </div>
</div>

<script>
    window.addEventListener('DOMContentLoaded', function() {
        const editData = sessionStorage.getItem('editCharacter');
        const editRow = sessionStorage.getItem('editRowNumber');
    
        if (editData && editRow) {
            const character = JSON.parse(editData);
        
            document.getElementById('charName').value = character.name || '';
            document.getElementById('imageUrl').value = character.image_url || '';
        
            if (character.image_url) {
                const img = document.createElement('img');
                img.src = character.image_url;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                portraitPreview.innerHTML = '';
                portraitPreview.appendChild(img);
            }
        
            document.getElementById('status').value = character.status || '';
            document.getElementById('currentTime').value = character.current_time || '';
            document.getElementById('location').value = character.location || '';
            document.getElementById('inventory').value = character.inventory || '';
            document.getElementById('race').value = character.race || '';
            document.getElementById('birthDate').value = character.birth_date || '';
            document.getElementById('birthPlace').value = character.birth_place || '';
            document.getElementById('lifespan').value = character.lifespan || '';
            document.getElementById('starSign').value = character.star_sign || '';
            document.getElementById('firstAppearance').value = character.first_appearance || '';
            document.getElementById('statusTitle').value = character.status_title || '';
            document.getElementById('profession').value = character.profession || '';
            document.getElementById('biography').value = character.biography || '';
            document.getElementById('appearanceText').value = character.appearance || '';
            document.getElementById('personalityText').value = character.personality || '';
        
            document.getElementById('responseMessage').innerHTML = `✏️ Редактируем персонажа "${character.name}"<br>После сохранения данные обновятся.`;
        
            window.editRowNumber = editRow;
        
            sessionStorage.removeItem('editCharacter');
            sessionStorage.removeItem('editRowNumber');
        }
    });

    
    let pendingData = null;
    let existingRow = null;

    const uploadInput = document.getElementById('imageUpload');
    const portraitPreview = document.getElementById('portraitPreview');

    document.getElementById('uploadBtn').onclick = () => uploadInput.click();
    uploadInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                portraitPreview.innerHTML = '';
                const img = document.createElement('img');
                img.src = ev.target.result;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                portraitPreview.appendChild(img);
            };
            reader.readAsDataURL(file);
        }
    };

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab).classList.add('active');
        };
    });

    const submitBtn = document.getElementById('submitForm');
    const responseDiv = document.getElementById('responseMessage');
    const modal = document.getElementById('confirmModal');

    const imageUrlInput = document.getElementById('imageUrl');

    imageUrlInput.addEventListener('change', function() {
        const url = this.value.trim();
        if (url) {
            const img = document.createElement('img');
            img.onload = function() {
                portraitPreview.innerHTML = '';
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                portraitPreview.appendChild(img);
            };
            img.onerror = function() {
                alert('Не удалось загрузить изображение по ссылке. Проверьте URL.');
            };
            img.src = url;
        }
    });

    async function saveCharacter(overwrite = false) {
        const name = document.getElementById('charName').value;
        const existingRow = window.editRowNumber || (overwrite ? window.existingRow : null);
        const data = {
            name: document.getElementById('charName').value,
            image_url: document.getElementById('imageUrl').value,
            status: document.getElementById('status').value,
            current_time: document.getElementById('currentTime').value,
            location: document.getElementById('location').value,
            inventory: document.getElementById('inventory').value,
            race: document.getElementById('race').value,
            birth_date: document.getElementById('birthDate').value,
            birth_place: document.getElementById('birthPlace').value,
            lifespan: document.getElementById('lifespan').value,
            star_sign: document.getElementById('starSign').value,
            first_appearance: document.getElementById('firstAppearance').value,
            status_title: document.getElementById('statusTitle').value,
            profession: document.getElementById('profession').value,
            biography: document.getElementById('biography').value,
            appearance: document.getElementById('appearanceText').value,
            personality: document.getElementById('personalityText').value,
            overwrite: overwrite,
            existing_row: existingRow
        };

        responseDiv.innerHTML = '🕯️ Сохранение... 🕯️';

        try {
            const res = await fetch('/api/character/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (res.ok) {
                responseDiv.innerHTML = `✨ ${result.message} ✨<br>⏳ Время: ${result.timestamp}`;
                if (!overwrite) {
                    document.getElementById('charName').value = '';
                }
            } else {
                responseDiv.innerHTML = `❌ Ошибка: ${result.error}`;
            }
        } catch (err) {
            responseDiv.innerHTML = `❌ Ошибка соединения: ${err.message}`;
        }
    }

    submitBtn.onclick = async () => {
        const name = document.getElementById('charName').value.trim();

        if (window.editRowNumber) {
            saveCharacter(true);
            return;
        }
        
        if (!name) {
            saveCharacter(false);
            return;
        }

        try {
            const res = await fetch('/api/character/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            });
            const result = await res.json();
            
            if (result.exists) {
                document.getElementById('modalMessage').innerHTML = 
                    `Персонаж "${name}" уже существует.<br>Хотите перезаписать его?`;
                pendingData = { name: name };
                existingRow = result.row_number;
                modal.style.display = 'flex';
            } else {
                saveCharacter(false);
            }
        } catch (err) {
            responseDiv.innerHTML = `❌ Ошибка проверки имени: ${err.message}`;
        }
    };

    document.getElementById('confirmOverwrite').onclick = () => {
        modal.style.display = 'none';
        saveCharacter(true);
    };

    document.getElementById('confirmCancel').onclick = () => {
        modal.style.display = 'none';
        pendingData = null;
        existingRow = null;
        responseDiv.innerHTML = 'ℹ️ Сохранение отменено. Измените имя и попробуйте снова.';
    };

    window.onclick = (e) => {
        if (e.target === modal) modal.style.display = 'none';
    };
</script>
</body>
</html>
